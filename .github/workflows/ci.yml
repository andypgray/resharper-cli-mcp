name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/Zphil.ReSharperCli.Tests/Zphil.ReSharperCli.Tests.csproj

      - name: Build
        run: dotnet build tests/Zphil.ReSharperCli.Tests/Zphil.ReSharperCli.Tests.csproj --no-restore

      - name: Test
        # Exclude the ExternalLinks network liveness test; it runs only on the weekly linkcheck.yml
        # schedule. Keeps the every-PR suite fully offline, deterministic, and fast.
        run: dotnet test tests/Zphil.ReSharperCli.Tests/Zphil.ReSharperCli.Tests.csproj --no-build --filter "Category!=ExternalLinks" --logger "console;verbosity=normal"

  # Packs on Linux and asserts the MCP manifest lands at exactly `.mcp/server.json` — the
  # path nuget.org scans to generate the VS Code MCP config. A backslash PackagePath
  # mis-packs only on non-Windows (1.0.0 shipped `.mcp//server.json`), so a single
  # ubuntu job — not the 3-OS matrix — is the leg that catches it.
  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/Zphil.ReSharperCli/Zphil.ReSharperCli.csproj -c Release -o artifacts

      - name: Verify server.json is packed at .mcp/server.json
        run: |
          entries="$(unzip -Z1 artifacts/*.nupkg)"
          grep -Fxq '.mcp/server.json' <<<"$entries" || {
            echo "::error::MCP manifest missing or mis-pathed in the packed nupkg (need .mcp/server.json)"
            printf '%s\n' "$entries" | grep -i 'server\.json' || true
            exit 1
          }
